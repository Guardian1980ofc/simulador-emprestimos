{% extends 'simulador/base.html' %}
{% load static %}

{% block titulo %}Nova Simulação - MoneyLab{% endblock %}

{% block conteudo %}
<link rel="stylesheet" href="{% static 'simulador/css/criar.css' %}">

<div class="nome">
    <h1>Nova Simulação de Empréstimo</h1>
</div>

<form method="POST">
    {% csrf_token %}
    <label>Valor do Empréstimo:</label>
    <input type="number" name="valor" id="valor" placeholder="Ex: 1000" required>

    <label>Taxa de Juros (% ao mês):</label>
    <input type="number" name="juros" id="juros" placeholder="Ex: 2" step="0.01" required>

    <label>Prazo (meses):</label>
    <input type="number" name="prazo" id="prazo" placeholder="Ex: 12" required>

    <h3>Resultado:</h3>
    <p>Parcela mensal: R$ <span id="resultado_parcela">0.00</span></p>
    <p>Valor total: R$ <span id="resultado_total">0.00</span></p>

    <input type="hidden" name="parcela" id="parcela">
    <input type="hidden" name="valor_final" id="valor_final">

    <button type="submit">Salvar Simulação</button>

    <canvas id="meuGrafico" width="400" height="200"></canvas>
</form>
{% endblock %}
