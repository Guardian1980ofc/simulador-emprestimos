{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'simulador/css/base.css' %}">
    <title>{% block titulo %}MoneyLab{% endblock %}</title>
</head>

<body>
    <div class="logo-container">
        <h1>MoneyLab</h1>
    </div>
    <nav>
        <a href="{% url 'lista_simulacoes' %}">Início</a>
        <a href="{% url 'criar_simulacoes' %}">Nova Simulação</a>
    </nav>

    <main>
        {% block conteudo %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{% static 'simulador/js/script.js' %}"></script>
    {% block script %}{% endblock %}
</body>

</html>
